name: Build installer

# Push a tag like v0.1.0 to build downloads and attach them to a Release.
# The server exe + a portable bundle always publish. The Godot client export and
# the full installer are best-effort (they need Godot export templates in CI),
# so a flaky export never blocks the release.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Freeze the server (PyInstaller)
        run: |
          python -m pip install --quiet pyinstaller websockets
          python -m PyInstaller --onefile --name RealmweaveServer `
            --distpath "${{ github.workspace }}/build" `
            --workpath "${{ github.workspace }}/build/tmp" `
            --specpath "${{ github.workspace }}/build/tmp" `
            backend/run_server.py

      - name: Make the portable bundle (server + launcher + docs)
        run: |
          $stage = "${{ github.workspace }}/build/portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "${{ github.workspace }}/build/RealmweaveServer.exe" $stage
          Copy-Item packaging/Launch-Realmweave.bat $stage -ErrorAction SilentlyContinue
          Copy-Item backend/config.json $stage
          Copy-Item README.md $stage
          Copy-Item docs/PLAY.md $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "${{ github.workspace }}/build/Realmweave-portable.zip" -Force

      - name: Set up Godot (with export templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          include-templates: true
          use-dotnet: false

      - name: Export the client (best effort)
        id: client
        continue-on-error: true
        run: |
          # Godot logs warnings to stderr; do NOT let that abort the step.
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path build | Out-Null
          # The setup-godot 'bin/godot' shim has no extension and won't execute
          # on Windows, so find the real engine exe the action unpacked.
          $godot = (Get-ChildItem "$env:USERPROFILE\godot" -Recurse -Filter "Godot_*.exe" -ErrorAction SilentlyContinue |
                    Where-Object { $_.Name -notlike '*console*' } | Select-Object -First 1).FullName
          if (-not $godot) { $godot = (Get-ChildItem "$env:USERPROFILE" -Recurse -Filter "Godot_*win64*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName }
          if (-not $godot -and (Test-Path "$env:GODOT.exe")) { $godot = "$env:GODOT.exe" }
          Write-Host "using godot: $godot"
          & $godot --version
          Write-Host "version exit: $LASTEXITCODE"
          # import assets (run twice; the first pass can return before resources settle)
          & $godot --headless --path godot_client --import
          & $godot --headless --path godot_client --import
          Write-Host "import exit: $LASTEXITCODE"
          & $godot --headless --path godot_client --export-release "Windows Desktop" "$env:GITHUB_WORKSPACE/build/RealmweaveClient.exe"
          Write-Host "export exit: $LASTEXITCODE"
          Get-ChildItem "$env:GITHUB_WORKSPACE/build" | ForEach-Object { Write-Host "  build/ $($_.Name)" }
          if (Test-Path "$env:GITHUB_WORKSPACE/build/RealmweaveClient.exe") {
            "ok=true"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "ok=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Build the installer (if the client exported)
        if: steps.client.outputs.ok == 'true'
        continue-on-error: true
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\realmweave.iss

      - name: Publish the Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            build/RealmweaveServer.exe
            build/Realmweave-portable.zip
            build/RealmweaveSetup.exe
