name: Build installer

# Push a tag like v0.1.0 to build the Windows installer and attach it to a Release.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Freeze the server (PyInstaller)
        run: |
          python -m pip install --quiet pyinstaller websockets
          python -m PyInstaller --onefile --name RealmweaveServer `
            --distpath "${{ github.workspace }}/build" `
            --workpath "${{ github.workspace }}/build/tmp" `
            --specpath "${{ github.workspace }}/build/tmp" `
            backend/run_server.py

      - name: Set up Godot (with export templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          include-templates: true

      - name: Export the client
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/build" | Out-Null
          # import resources first, then export. The output path comes from the
          # preset (export_presets.cfg -> ../build/RealmweaveClient.exe, i.e.
          # repo/build), so we do NOT pass an explicit path (that would resolve
          # against the runner cwd and escape the repo).
          godot --headless --path godot_client --import
          godot --headless --path godot_client --export-release "Windows Desktop"
          if (!(Test-Path "${{ github.workspace }}/build/RealmweaveClient.exe")) { throw "client export missing" }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build the installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\realmweave.iss

      - name: Upload installer to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/RealmweaveSetup.exe
