<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Realmweave - Oakhollow Map</title>
<style>
  :root{--bg:#0e0f14;--line:#2b3040;--ink:#e7e8ee;--dim:#9aa0b4;--gold:#d9c46b;--blue:#5aa0c0;--green:#5ab97a;--red:#c85a5a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif}
  a{color:var(--blue);text-decoration:none}
  header{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:12px 18px;background:linear-gradient(#15171f,#101218);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  h1{font-size:18px;margin:0;color:var(--gold);letter-spacing:.5px}
  h1 small{color:var(--dim);font-weight:400;font-size:12px}
  nav{display:flex;gap:6px;font-size:12px}
  nav a{border:1px solid var(--line);padding:3px 9px;border-radius:6px;color:var(--dim)}
  nav a.active{color:var(--gold);background:#20242f}
  .spacer{flex:1}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--dim)}
  .dot.on{background:var(--green);box-shadow:0 0 7px var(--green)}.dot.demo{background:var(--gold)}.dot.off{background:var(--red)}
  input,button{font:inherit;background:#0d0f15;border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:5px 8px}
  button{background:#1e222c;cursor:pointer}button:hover{border-color:var(--blue)}
  main{max-width:1000px;margin:0 auto;padding:16px;text-align:center}
  canvas{width:100%;max-width:960px;height:auto;border:1px solid var(--line);border-radius:12px;background:#0b0d12}
  .legend{color:var(--dim);font-size:12px;margin-top:8px}
  footer{color:var(--dim);font-size:11px;text-align:center;padding:14px}
</style>
</head>
<body>
<header>
  <h1>Realmweave <small>Oakhollow, from above</small></h1>
  <nav>
    <a href="index.html">World</a><a href="map.html" class="active">Map</a><a href="eyes.html">Characters</a><a href="dev.html">Dev status</a>
  </nav>
  <span class="status"><span class="dot" id="dot"></span><span id="statusText">connecting...</span></span>
  <span class="spacer"></span>
  <span id="clock" style="color:var(--gold);font-weight:600"></span>
  <input id="url" spellcheck="false" style="width:190px" />
  <button id="connectBtn">Connect</button>
</header>

<main>
  <canvas id="cv" width="960" height="720"></canvas>
  <div class="legend" id="mode"></div>
</main>

<footer>The map tints with the world clock - dawn, day, dusk and night. Start the server (<code>python run_server.py</code>) for the living world; otherwise a demo village is shown.</footer>

<script>
const DEFAULT_URL="ws://127.0.0.1:8765";
const $=s=>document.querySelector(s);
const cv=$("#cv"), ctx=cv.getContext("2d");
const SCALE=cv.width/66, OX=18, OY=18;
let ws=null, demoTimer=null, isDemo=false;
let world=null, snap=null, rpos={};

const urlInput=$("#url");
try{ urlInput.value=localStorage.getItem("rw_url")||DEFAULT_URL; }catch(e){ urlInput.value=DEFAULT_URL; }
function setStatus(k,t){ $("#dot").className="dot "+(k==="on"?"on":k==="demo"?"demo":"off"); $("#statusText").textContent=t; }
function px(x,y){ return [OX + x*SCALE, OY + y*SCALE]; }

const ROLE_COLOR={Tavernkeeper:"#d9c46b","Stable hand":"#b08850",Blacksmith:"#c85a5a","Street sweeper":"#7fa0b0",
  Farmer:"#7fb05a","Gate guard":"#9aa4b4","Errand child":"#5ac0c0",Herbalist:"#a77bd0"};
const KIND_COLOR={tavern:"#7a4a20",home:"#4a4f6a",stable:"#6a5236",well:"#356f7f",square:"#3f5a3a",
  smithy:"#6a3a3a",field:"#5a7a3a",gate:"#565a66",shop:"#b0842a"};

function loc(id){ return (world.locations||[]).find(l=>l.id===id); }

function draw(){
  if(!world){ return; }
  ctx.clearRect(0,0,cv.width,cv.height);
  // grass ground
  ctx.fillStyle="#2b3b28"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#30422c";
  for(let gx=0;gx<66;gx+=2) for(let gy=0;gy<52;gy+=2){ if((gx+gy)%4===0){ const [x,y]=px(gx,gy); ctx.fillRect(x,y,SCALE*2,SCALE*2);} }
  // pond
  (world.props||[]).filter(p=>p.kind==="pond").forEach(p=>{ const [x,y]=px(p.x,p.y);
    ctx.fillStyle="#2f5a70"; ctx.beginPath(); ctx.ellipse(x,y,SCALE*4,SCALE*2.6,0,0,7); ctx.fill();
    ctx.strokeStyle="#3f7088"; ctx.stroke(); });
  // paths from the square hub to each place
  const sq=loc("square");
  if(sq){ ctx.strokeStyle="#5a4c33"; ctx.lineWidth=SCALE*0.7; ctx.lineCap="round";
    (world.locations||[]).forEach(l=>{ if(l.id==="square"||l.kind==="home") return;
      const [ax,ay]=px(sq.x,sq.y), [bx,by]=px(l.x,l.y);
      ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke(); }); }
  // buildings
  (world.locations||[]).forEach(l=>{ const [x,y]=px(l.x,l.y); const c=KIND_COLOR[l.kind]||"#555";
    const w=SCALE*3.4,h=SCALE*2.4;
    ctx.fillStyle=c; ctx.fillRect(x-w/2,y-h/2,w,h);
    ctx.fillStyle="#0006"; ctx.fillRect(x-w/2,y-h/2,w,h*0.34); // roof shadow
    ctx.strokeStyle="#0008"; ctx.lineWidth=1; ctx.strokeRect(x-w/2,y-h/2,w,h);
    ctx.fillStyle="#c9cede"; ctx.font="10px system-ui"; ctx.textAlign="center";
    ctx.fillText(l.name, x, y+h/2+11); });
  // trees & rocks
  (world.props||[]).forEach(p=>{ const [x,y]=px(p.x,p.y);
    if(p.kind==="tree"){ ctx.fillStyle="#5a3f22"; ctx.fillRect(x-1.5,y-2,3,SCALE*1.4);
      ctx.fillStyle="#3c6b34"; ctx.beginPath(); ctx.arc(x,y-SCALE*0.6,SCALE*1.6,0,7); ctx.fill();
      ctx.fillStyle="#4b8040"; ctx.beginPath(); ctx.arc(x-2,y-SCALE*0.9,SCALE*1.0,0,7); ctx.fill(); }
    else if(p.kind==="rock"){ ctx.fillStyle="#6b6f78"; ctx.beginPath(); ctx.arc(x,y,SCALE*0.9,0,7); ctx.fill(); } });
  // agents
  (snap&&snap.agents||[]).forEach(a=>{
    const id=a.id, tgt=px(a.x,a.y);
    if(!rpos[id]) rpos[id]=tgt.slice();
    rpos[id][0]+=(tgt[0]-rpos[id][0])*0.2; rpos[id][1]+=(tgt[1]-rpos[id][1])*0.2;
    const [x,y]=rpos[id]; const alive=a.alive!==false;
    const col=alive?(ROLE_COLOR[a.role]||"#cbb87a"):"#4a4040";
    if(a.wanted){ ctx.strokeStyle="#c85a5a"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y-2,SCALE*1.5,0,7); ctx.stroke(); }
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y-SCALE*0.7,SCALE*0.7,0,7); ctx.fill();      // head
    ctx.fillRect(x-SCALE*0.6,y-SCALE*0.2,SCALE*1.2,SCALE*1.3);                                  // body
    ctx.fillStyle=alive?"#e7e8ee":"#8a8a8a"; ctx.font="10px system-ui"; ctx.textAlign="center";
    ctx.fillText(alive?a.name:(a.name+" +"), x, y-SCALE*1.6);
    if(a.alias){ ctx.fillStyle="#9aa0b4"; ctx.font="9px system-ui"; ctx.fillText("aka "+a.alias, x, y+SCALE*1.9); }
  });
  // players
  (snap&&snap.players||[]).forEach(p=>{ const [x,y]=px(p.x,p.y);
    ctx.fillStyle="#5ac0f0"; ctx.beginPath(); ctx.arc(x,y-SCALE*0.7,SCALE*0.8,0,7); ctx.fill();
    ctx.fillRect(x-SCALE*0.6,y-SCALE*0.2,SCALE*1.2,SCALE*1.3);
    ctx.fillStyle="#bfe6ff"; ctx.font="10px system-ui"; ctx.textAlign="center"; ctx.fillText(p.name, x, y-SCALE*1.6); });
  // day / night tint
  applyTint();
}

function applyTint(){
  const pod = snap&&snap.clock? snap.clock.part_of_day : "afternoon";
  const tint={ night:"rgba(12,22,60,0.5)", evening:"rgba(120,60,20,0.24)",
               morning:"rgba(200,170,120,0.10)", afternoon:"rgba(0,0,0,0)" }[pod] || "rgba(0,0,0,0)";
  ctx.fillStyle=tint; ctx.fillRect(0,0,cv.width,cv.height);
  if(snap&&snap.clock){ $("#clock").textContent=`Day ${snap.clock.day_index} - ${snap.clock.hhmm} (${pod})`; }
}

function loop(){ draw(); requestAnimationFrame(loop); }

function connect(){
  const url=urlInput.value.trim()||DEFAULT_URL;
  try{ localStorage.setItem("rw_url",url); }catch(e){}
  if(ws){ try{ws.onclose=null;ws.close();}catch(e){} }
  setStatus("off","connecting..."); clearTimeout(demoTimer);
  demoTimer=setTimeout(()=>{ if(!ws||ws.readyState!==1) startDemo(); },2500);
  try{ ws=new WebSocket(url); }catch(e){ startDemo(); return; }
  ws.onopen=()=>{ isDemo=false; clearTimeout(demoTimer); setStatus("on","connected"); $("#mode").textContent="live"; };
  ws.onmessage=ev=>{ let m; try{m=JSON.parse(ev.data);}catch(e){return;}
    if(m.type==="hello") world=m.world;
    else if(m.type==="snapshot"){ snap=m; if(m.world) world=m.world; } };
  ws.onclose=()=>{ setStatus("off","disconnected"); if(!isDemo) demoTimer=setTimeout(startDemo,1500); };
}

function startDemo(){
  isDemo=true; setStatus("demo","demo village"); $("#mode").textContent="demo village (start the server for the living world)";
  world={ name:"Oakhollow",
    locations:[{id:"square",name:"Village Square",x:32,y:24,kind:"square"},{id:"tavern",name:"The Gilded Stag",x:20,y:18,kind:"tavern"},
      {id:"well",name:"Old Well",x:32,y:30,kind:"well"},{id:"stable",name:"Stables",x:46,y:20,kind:"stable"},
      {id:"smithy",name:"Ironbark Smithy",x:44,y:30,kind:"smithy"},{id:"field",name:"North Fields",x:30,y:6,kind:"field"},
      {id:"gate",name:"South Gate",x:32,y:44,kind:"gate"},{id:"home_bram",name:"Bram's Room",x:14,y:22,kind:"home"},
      {id:"shop_toft",name:"Toft's Shop",x:26,y:27,kind:"shop"}],
    props:[{kind:"tree",x:8,y:8},{kind:"tree",x:52,y:8},{kind:"tree",x:12,y:40},{kind:"tree",x:56,y:40},
      {kind:"tree",x:6,y:26},{kind:"tree",x:58,y:24},{kind:"tree",x:40,y:46},{kind:"tree",x:24,y:4},
      {kind:"pond",x:12,y:32},{kind:"rock",x:26,y:6}] };
  snap={ clock:{day_index:3,hhmm:"19:40",part_of_day:"evening"},
    agents:[{id:"toft",name:"Toft Bellow",role:"Blacksmith",x:26,y:27,alive:true},
      {id:"bram",name:"Bram Cask",role:"Tavernkeeper",x:20,y:18,alive:true},
      {id:"isla",name:"Isla Fenn",role:"Stable hand",x:46,y:20,alive:true},
      {id:"dora",name:"Dora Meel",role:"Farmer",x:30,y:6,alive:true},
      {id:"pip",name:"Pip Thorne",role:"Errand child",x:32,y:24,alive:true},
      {id:"vagr",name:"Sly Vagrant",role:"Errand child",x:34,y:26,alive:true,wanted:1,alias:"The Masked One"}],
    players:[{id:"p",name:"Ada",x:33,y:23}] };
}

$("#connectBtn").onclick=connect;
connect(); loop();
</script>
</body>
</html>
